name: AgroMind Price Scanner

on:
  schedule:
    - cron: '0 4 * * *'   # 06:00-07:00 România
    - cron: '0 13 * * *'  # 15:00-16:00 România
  workflow_dispatch:       # rulare manuală

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5h max

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan all shops
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py --shop all

      - name: Run matching (new products only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python match_products.py

      - name: Enrich new products (AI substanță activă)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python enrich_products.py

      - name: Upload scan data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-data-${{ github.run_id }}
          path: data/
          retention-days: 7
